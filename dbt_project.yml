name: 'dalgo_dsf'
version: '1.0.0'
config-version: 2

profile: 'dalgo_dsf'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

flags:
  require_explicit_package_overrides_for_builtin_materializations: false

models:
  dalgo_dsf:
    # Pune Project (existing)
    staging:
      +materialized: table
    prod:
      +materialized: table
    marts:
      +materialized: table

    # Nadiad Project (NEW)
    nadiad:
      staging:
        +materialized: table
        +schema: staging
      intermediate:
        +materialized: table
        +schema: intermediate
      marts:
        +materialized: table
        +schema: prod

  elementary:
    +schema: "elementary"
